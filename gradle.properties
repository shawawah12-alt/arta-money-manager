org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Enable Gradle build cache so agent builds get cache hits on unchanged template
# files. Cache is keyed by content hash (not path), so copies of this workspace
# reuse entries compiled into the worker Docker image via assembleDebug --build-cache.
org.gradle.caching=true
org.gradle.parallel=true
